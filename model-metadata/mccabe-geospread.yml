citation: "McCabe R, Ebbarnezh L, Okware S, et al. Estimation of the Ebola outbreak size in the Democratic Republic of the Congo. Lancet Infect Dis 2026. https://doi.org/10.1016/S1473-3099(26)00299-9"
model_details:
  data_inputs: "3 confirmed Bundibugyo virus disease cases exported to Uganda as of 27 May 2026; estimated daily international travel volumes from Ituri and Nord Kivu provinces (DRC) to Uganda; Ituri and Nord Kivu province populations."
  methods: "Geographical-spread model using 3 BVD cases exported to Uganda, daily travel volumes, and a detection window; main scenario: Ituri source population, 10-day doubling time."
  methods_long: "Method 2 (geographical spread) of McCabe et al. (Lancet Infect Dis 2026), extending the approach of Imai et al. (2020). The reported value is the estimated cumulative number of symptomatic Bundibugyo virus disease cases that had occurred in DR Congo as of the reference date (27 May 2026); the method assumes all symptomatic travellers are detected by the time of recovery or death, so the estimated outbreak size corresponds to symptomatic cases, matching the hub target. The single submitted estimate corresponds to the paper's main scenario: Ituri province as the source population (n=4,392,200) with a 10-day epidemic doubling time (mean 945, 95% CI 196-2274; Table 2). IMPORTANT UNCERTAINTY CAVEAT: the quantiles submitted here are derived from the paper's negative-binomial confidence interval, which reflects only the sampling uncertainty in the 3 observed exported cases. It does NOT propagate parameter uncertainty in travel volumes, source population, or epidemic growth rate; in the paper that parameter uncertainty is instead explored across scenarios (mean estimates ranging roughly 847-1354 across growth/source-population scenarios for this method). The 7 quantiles were reconstructed from the code as qnbinom(p, size=3, prob=0.0031736) + 3, which reproduces the published 196/2274 interval endpoints. These estimates were transcribed into hubverse format by the BVBD Modeling Hub from the published paper and accompanying code (https://github.com/mrc-ide/evd-2026-outbreak-size); they were not submitted by the original authors."
